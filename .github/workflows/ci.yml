name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-07-09
          components: clippy,rust-src,rustfmt
      - run: cargo fmt --all -- --check
      - run: cargo check -Zbuild-std=core --locked --target riscv32imfc-unknown-none-elf --no-default-features --features panic-halt
      - run: cargo check -Zbuild-std=core --locked --target riscv32imfc-unknown-none-elf --no-default-features --features panic-uart0
      - run: cargo clippy -Zbuild-std=core --locked --target riscv32imfc-unknown-none-elf --no-default-features --features panic-uart0 -- -D warnings
      - run: cargo package --locked
